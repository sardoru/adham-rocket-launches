<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adham's Rocket Launch Tracker</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">

  <!-- OG / Link Preview -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Adham's Rocket Launch Tracker">
  <meta property="og:description" content="Explore every rocket launch on a 3D globe! Track SpaceX, NASA, and more with animated trajectories, countdowns, and fun space facts.">
  <meta property="og:image" content="https://adham-rocket-launches.vercel.app/og-image.png">
  <meta property="og:url" content="https://adham-rocket-launches.vercel.app">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Adham's Rocket Launch Tracker">
  <meta name="twitter:description" content="Explore every rocket launch on a 3D globe! Track SpaceX, NASA, and more with animated trajectories, countdowns, and fun space facts.">
  <meta name="twitter:image" content="https://adham-rocket-launches.vercel.app/og-image.png">
  <meta name="description" content="Explore every rocket launch on a 3D globe! Track SpaceX, NASA, and more with animated trajectories, countdowns, and fun space facts.">
  <meta name="theme-color" content="#0a0a1a">

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://unpkg.com/globe.gl@2.35.1/dist/globe.gl.min.js"></script>
  <script src="https://unpkg.com/satellite.js@5.0.0/dist/satellite.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #0a0a1a;
      color: #e0e0ff;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* Stars background */
    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--duration) ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    /* Header */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(10,10,26,0.95) 0%, rgba(10,10,26,0.7) 80%, transparent 100%);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-size: 1.4rem;
      font-weight: 900;
      background: linear-gradient(135deg, #00d4ff, #7b61ff, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    .logo-sub {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 4px;
      color: #6b7db3;
      text-transform: uppercase;
    }

    .header-stats {
      display: flex;
      gap: 20px;
      font-family: 'Orbitron', monospace;
    }

    .stat-box {
      text-align: center;
      padding: 6px 16px;
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 8px;
      background: rgba(0,212,255,0.05);
    }

    .stat-box .num {
      font-size: 1.3rem;
      font-weight: 700;
      color: #00d4ff;
    }

    .stat-box .label {
      font-size: 0.55rem;
      color: #6b7db3;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Globe container */
    #globe-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 70px;
      right: 0;
      width: 380px;
      height: calc(100vh - 70px);
      z-index: 50;
      background: linear-gradient(135deg, rgba(10,10,30,0.92) 0%, rgba(20,15,40,0.92) 100%);
      backdrop-filter: blur(20px);
      border-left: 1px solid rgba(123,97,255,0.15);
      display: flex;
      flex-direction: column;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .sidebar.collapsed {
      transform: translateX(340px);
    }

    .sidebar-toggle {
      position: absolute;
      left: -40px;
      top: 20px;
      width: 40px;
      height: 40px;
      background: rgba(20,15,40,0.9);
      border: 1px solid rgba(123,97,255,0.3);
      border-right: none;
      border-radius: 8px 0 0 8px;
      color: #7b61ff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Tabs */
    .tabs {
      display: flex;
      padding: 12px 16px 0;
      gap: 4px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      color: #6b7db3;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .tab.active {
      background: rgba(123,97,255,0.15);
      color: #c4b5ff;
      border-color: rgba(123,97,255,0.3);
    }

    .tab:hover { color: #fff; }

    /* Launch list */
    .launch-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      scrollbar-width: thin;
      scrollbar-color: rgba(123,97,255,0.3) transparent;
    }

    .launch-list::-webkit-scrollbar { width: 4px; }
    .launch-list::-webkit-scrollbar-thumb { background: rgba(123,97,255,0.3); border-radius: 2px; }

    .launch-card {
      padding: 14px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .launch-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      border-radius: 3px 0 0 3px;
    }

    .launch-card.spacex::before { background: linear-gradient(180deg, #005288, #a7d8f0); }
    .launch-card.nasa::before { background: linear-gradient(180deg, #fc3d21, #ffa500); }
    .launch-card.other::before { background: linear-gradient(180deg, #7b61ff, #c4b5ff); }

    .launch-card:hover {
      background: rgba(123,97,255,0.08);
      border-color: rgba(123,97,255,0.25);
      transform: translateX(-4px);
    }

    .launch-card.active {
      background: rgba(123,97,255,0.12);
      border-color: rgba(123,97,255,0.4);
      box-shadow: 0 0 20px rgba(123,97,255,0.1);
    }

    .launch-provider {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .launch-card.spacex .launch-provider { color: #a7d8f0; }
    .launch-card.nasa .launch-provider { color: #ff8a65; }
    .launch-card.other .launch-provider { color: #c4b5ff; }

    .launch-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .launch-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.75rem;
      color: #6b7db3;
    }

    .launch-date {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .launch-status {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .status-success { background: rgba(0,200,83,0.15); color: #69f0ae; }
    .status-upcoming { background: rgba(0,176,255,0.15); color: #40c4ff; }
    .status-failure { background: rgba(255,82,82,0.15); color: #ff5252; }
    .status-tbd { background: rgba(255,193,7,0.15); color: #ffd54f; }

    /* Detail panel */
    .detail-panel {
      position: fixed;
      bottom: 0; left: 0;
      width: calc(100% - 380px);
      z-index: 50;
      padding: 20px 30px;
      background: linear-gradient(0deg, rgba(10,10,26,0.95) 0%, rgba(10,10,26,0.8) 80%, transparent 100%);
      backdrop-filter: blur(10px);
      transform: translateY(100%);
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .detail-panel.show { transform: translateY(0); }

    .detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .detail-title {
      font-family: 'Orbitron', monospace;
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
    }

    .detail-provider {
      font-size: 0.7rem;
      color: #7b61ff;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .detail-close {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .detail-item {
      padding: 10px 14px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .detail-item .label {
      font-size: 0.6rem;
      color: #6b7db3;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .detail-item .value {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e0e0ff;
    }

    .fun-fact {
      margin-top: 12px;
      padding: 12px 16px;
      background: linear-gradient(135deg, rgba(123,97,255,0.08), rgba(0,212,255,0.08));
      border-radius: 10px;
      border: 1px solid rgba(123,97,255,0.15);
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .fun-fact strong { color: #00d4ff; }

    /* Loading screen */
    .loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0a0a1a;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s, visibility 0.8s;
    }

    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loading-rocket {
      font-size: 3rem;
      animation: rocketBounce 1s ease-in-out infinite;
    }

    @keyframes rocketBounce {
      0%, 100% { transform: translateY(0) rotate(-45deg); }
      50% { transform: translateY(-20px) rotate(-45deg); }
    }

    .loading-text {
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      color: #7b61ff;
      margin-top: 20px;
      letter-spacing: 4px;
    }

    .loading-bar {
      width: 200px;
      height: 3px;
      background: rgba(123,97,255,0.2);
      border-radius: 3px;
      margin-top: 16px;
      overflow: hidden;
    }

    .loading-bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #7b61ff, #00d4ff);
      border-radius: 3px;
      animation: loadBar 2.5s ease-in-out forwards;
    }

    @keyframes loadBar {
      0% { width: 0%; }
      40% { width: 50%; }
      80% { width: 85%; }
      100% { width: 100%; }
    }

    /* Filter bar */
    .filter-bar {
      padding: 8px 16px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 5px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: #6b7db3;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: rgba(123,97,255,0.2);
      border-color: rgba(123,97,255,0.4);
      color: #c4b5ff;
    }

    .filter-btn:hover { border-color: rgba(123,97,255,0.3); color: #fff; }

    /* Search */
    .search-box {
      padding: 0 16px 8px;
    }

    .search-box input {
      width: 100%;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .search-box input::placeholder { color: #4a5580; }
    .search-box input:focus { border-color: rgba(123,97,255,0.4); }

    /* Countdown for upcoming */
    .countdown {
      font-family: 'Orbitron', monospace;
      font-size: 0.75rem;
      color: #40c4ff;
      margin-top: 4px;
    }

    /* Tooltip on globe */
    .globe-tooltip {
      background: rgba(10,10,30,0.9) !important;
      border: 1px solid rgba(123,97,255,0.3) !important;
      border-radius: 8px !important;
      padding: 8px 12px !important;
      font-family: 'Space Grotesk', sans-serif !important;
      color: #e0e0ff !important;
      font-size: 0.8rem !important;
    }

    /* ── Satellite Controls Panel ── */
    .sat-panel {
      position: fixed;
      top: 74px;
      left: 16px;
      z-index: 80;
      width: 260px;
      background: linear-gradient(135deg, rgba(10,10,30,0.92) 0%, rgba(20,15,40,0.92) 100%);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(123,97,255,0.15);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
    }

    .sat-panel.collapsed {
      transform: translateX(-220px);
      opacity: 0.8;
    }

    .sat-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
    }

    .sat-panel-header:hover { background: rgba(255,255,255,0.03); }

    .sat-panel-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #c4b5ff;
      text-transform: uppercase;
    }

    .sat-panel-toggle {
      font-size: 0.8rem;
      color: #6b7db3;
      transition: transform 0.3s;
    }

    .sat-panel.collapsed .sat-panel-toggle { transform: rotate(180deg); }

    .sat-panel-body {
      padding: 8px 0;
      max-height: 500px;
      overflow-y: auto;
    }

    .sat-group {
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: background 0.2s;
      user-select: none;
    }

    .sat-group:hover { background: rgba(255,255,255,0.04); }

    .sat-toggle {
      width: 36px;
      height: 20px;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      position: relative;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .sat-toggle.on { background: rgba(123,97,255,0.5); }

    .sat-toggle::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #6b7db3;
      transition: all 0.3s;
    }

    .sat-toggle.on::after {
      left: 19px;
      background: #c4b5ff;
      box-shadow: 0 0 6px rgba(123,97,255,0.6);
    }

    .sat-color-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sat-info {
      flex: 1;
      min-width: 0;
    }

    .sat-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #e0e0ff;
    }

    .sat-count {
      font-size: 0.65rem;
      color: #6b7db3;
      font-family: 'Orbitron', monospace;
    }

    .sat-divider {
      height: 1px;
      background: rgba(255,255,255,0.04);
      margin: 4px 14px;
    }

    .sat-total-bar {
      padding: 10px 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sat-total-label {
      font-size: 0.65rem;
      color: #6b7db3;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .sat-total-num {
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: #00d4ff;
    }

    .sat-loading-msg {
      padding: 6px 14px;
      font-size: 0.7rem;
      color: #6b7db3;
      font-style: italic;
    }

    /* ISS special highlight */
    .sat-group.iss-row .sat-label { color: #ffd54f; }

    /* Responsive */
    @media (max-width: 900px) {
      .sidebar {
        width: 100%;
        top: auto;
        bottom: 0;
        height: 45vh;
        border-left: none;
        border-top: 1px solid rgba(123,97,255,0.15);
      }
      .sidebar.collapsed { transform: translateY(calc(45vh - 50px)); }
      .sidebar-toggle {
        left: 50%;
        top: -30px;
        transform: translateX(-50%);
        border-radius: 8px 8px 0 0;
        border: 1px solid rgba(123,97,255,0.3);
        border-bottom: none;
        width: 60px;
        height: 30px;
      }
      .detail-panel { width: 100%; display: none; }
      .header-stats { display: none; }
      .logo { font-size: 1rem; }
      .sat-panel { width: 220px; top: 64px; left: 8px; }
      .sat-panel.collapsed { transform: translateX(-182px); }
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-rocket">🚀</div>
    <div class="loading-text">LAUNCHING</div>
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  </div>

  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <!-- Header -->
  <div class="header">
    <div>
      <div class="logo">ADHAM'S LAUNCH TRACKER</div>
      <div class="logo-sub">Explore Every Rocket Launch on Earth</div>
    </div>
    <div class="header-stats">
      <div class="stat-box">
        <div class="num" id="totalLaunches">--</div>
        <div class="label">Total Launches</div>
      </div>
      <div class="stat-box">
        <div class="num" id="upcomingCount">--</div>
        <div class="label">Upcoming</div>
      </div>
      <div class="stat-box">
        <div class="num" id="satCount">--</div>
        <div class="label">Satellites Live</div>
      </div>
    </div>
  </div>

  <!-- Globe -->
  <div id="globe-container"></div>

  <!-- Satellite Controls -->
  <div class="sat-panel" id="satPanel">
    <div class="sat-panel-header" id="satPanelHeader">
      <span class="sat-panel-title">Live Satellites</span>
      <span class="sat-panel-toggle">◀</span>
    </div>
    <div class="sat-panel-body" id="satPanelBody">
      <div id="satGroupsList"></div>
      <div class="sat-total-bar">
        <span class="sat-total-label">Tracked</span>
        <span class="sat-total-num" id="satTotalNum">0</span>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <button class="sidebar-toggle" id="sidebarToggle">◀</button>

    <div class="tabs">
      <button class="tab active" data-tab="upcoming">🚀 Upcoming</button>
      <button class="tab" data-tab="past">🌟 Past</button>
    </div>

    <div class="search-box">
      <input type="text" placeholder="Search missions, rockets..." id="searchInput">
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="spacex">SpaceX</button>
      <button class="filter-btn" data-filter="nasa">NASA</button>
      <button class="filter-btn" data-filter="ula">ULA</button>
      <button class="filter-btn" data-filter="roscosmos">Roscosmos</button>
    </div>

    <div class="launch-list" id="launchList"></div>
  </div>

  <!-- Detail Panel -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <div>
        <div class="detail-provider" id="detailProvider"></div>
        <div class="detail-title" id="detailTitle"></div>
      </div>
      <button class="detail-close" id="detailClose">✕</button>
    </div>
    <div class="detail-grid" id="detailGrid"></div>
    <div class="fun-fact" id="funFact"></div>
  </div>

  <script>
    // ── State ──
    let globe;
    let allLaunches = { upcoming: [], past: [] };
    let currentTab = 'upcoming';
    let currentFilter = 'all';
    let activeLaunchId = null;
    let arcsData = [];

    // ── Satellite State ──
    const EARTH_RADIUS_KM = 6371;
    let satRawData = {};       // key -> array of TLE records
    let satPositions = [];     // merged array of { lat, lng, alt, color, name, constellation }
    let satUpdateTimer = null;

    const SAT_CONSTELLATIONS = {

    // Parse TLE text into array of { name, tle1, tle2 }
    function parseTLEText(text) {
      const lines = text.trim().split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const records = [];
      let i = 0;
      while (i < lines.length) {
        if (lines[i + 1] && lines[i + 1].startsWith('1 ') && lines[i + 2] && lines[i + 2].startsWith('2 ')) {
          records.push({ name: lines[i], tle1: lines[i + 1], tle2: lines[i + 2] });
          i += 3;
        } else if (lines[i].startsWith('1 ') && lines[i + 1] && lines[i + 1].startsWith('2 ')) {
          records.push({ name: 'Unknown', tle1: lines[i], tle2: lines[i + 1] });
          i += 2;
        } else {
          i++;
        }
      }
      return records;
    }

    // Propagate a single TLE record to get { lat, lng, alt } at given date
    function propagateSat(record, date) {
      try {
        const satrec = satellite.twoline2satrec(record.tle1, record.tle2);
        const posVel = satellite.propagate(satrec, date);
        if (!posVel.position) return null;
        const gmst = satellite.gstime(date);
        const geo = satellite.eciToGeodetic(posVel.position, gmst);
        const lat = satellite.degreesLat(geo.latitude);
        const lng = satellite.degreesLong(geo.longitude);
        const alt = geo.height; // km
        if (isNaN(lat) || isNaN(lng) || isNaN(alt)) return null;
        return { lat, lng, alt };
      } catch (e) {
        return null;
      }
    }

    // Fetch TLE data for a constellation
    async function fetchConstellation(key) {
      const cfg = SAT_CONSTELLATIONS[key];
      if (!cfg) return;
      try {
        const res = await fetch(cfg.url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        let records = parseTLEText(text);

        // Special: for ISS group (stations), filter to just ISS + Tiangong
        if (key === 'iss') {
          records = records.filter(r =>
            /ISS|ZARYA|TIANHE|TIANGONG|CSS/i.test(r.name)
          );
        }

        // Sample if needed
        if (cfg.sample && records.length > cfg.sample) {
          const step = Math.ceil(records.length / cfg.sample);
          records = records.filter((_, i) => i % step === 0);
        }

        satRawData[key] = records;
        updateSatCount(key);
      } catch (err) {
        console.warn(`Failed to fetch ${key} TLE:`, err);
        satRawData[key] = [];
      }
    }

    // Compute all enabled satellite positions for the current moment
    function computeSatPositions() {
      const now = new Date();
      const positions = [];
      let total = 0;

      for (const [key, cfg] of Object.entries(SAT_CONSTELLATIONS)) {
        if (!cfg.enabled || !satRawData[key]) continue;
        const records = satRawData[key];

        for (const rec of records) {
          const pos = propagateSat(rec, now);
          if (!pos) continue;
          // Scale altitude for visual clarity
          // LEO ~400km → ~0.06, MEO/GPS ~20200km → ~0.5 (compressed for visibility)
          const rawAlt = pos.alt / EARTH_RADIUS_KM;
          // Compress high altitudes so GPS doesn't fly off screen
          const scaledAlt = rawAlt < 0.15 ? rawAlt + 0.02 : 0.15 + Math.sqrt(rawAlt - 0.15) * 0.3;
          positions.push({
            lat: pos.lat,
            lng: pos.lng,
            alt: scaledAlt,
            color: cfg.color,
            name: rec.name.trim(),
            constellation: key,
            radius: key === 'iss' ? 0.7 : (key === 'gps' || key === 'glonass' || key === 'galileo') ? 0.35 : 0.15,
          });
          total++;
        }
      }

      satPositions = positions;
      document.getElementById('satCount').textContent = total.toLocaleString();
      document.getElementById('satTotalNum').textContent = total.toLocaleString();
      return positions;
    }

    // Compute orbital paths (past trail + future track) for a subset of satellites
    function computeOrbitalPaths() {
      const now = Date.now();
      const paths = [];

      // How many path points and time range per constellation type
      const pathCfg = {
        iss:     { count: 999, steps: 120, spanMin: 90 },  // all ISS, full orbit
        starlink:{ count: 15,  steps: 60,  spanMin: 45 },  // sample 15
        oneweb:  { count: 8,   steps: 60,  spanMin: 45 },
        gps:     { count: 6,   steps: 80,  spanMin: 180 },  // higher orbit = longer period
        glonass: { count: 4,   steps: 80,  spanMin: 180 },
        galileo: { count: 4,   steps: 80,  spanMin: 180 },
        iridium: { count: 6,   steps: 60,  spanMin: 50 },
        science: { count: 4,   steps: 60,  spanMin: 50 },
      };

      for (const [key, cfg] of Object.entries(SAT_CONSTELLATIONS)) {
        if (!cfg.enabled || !satRawData[key]) continue;
        const pcfg = pathCfg[key] || { count: 5, steps: 60, spanMin: 45 };
        const records = satRawData[key].slice(0, pcfg.count);

        for (const rec of records) {
          const coords = [];
          const halfSpan = pcfg.spanMin / 2;
          const stepMs = (pcfg.spanMin * 60000) / pcfg.steps;

          for (let i = 0; i <= pcfg.steps; i++) {
            const t = new Date(now - halfSpan * 60000 + i * stepMs);
            const pos = propagateSat(rec, t);
            if (!pos) continue;
            const rawAlt = pos.alt / EARTH_RADIUS_KM;
            const alt = rawAlt < 0.15 ? rawAlt + 0.02 : 0.15 + Math.sqrt(rawAlt - 0.15) * 0.3;
            coords.push({ lat: pos.lat, lng: pos.lng, alt });
          }

          if (coords.length > 2) {
            paths.push({ coords, color: cfg.color, constellation: key });
          }
        }
      }
      return paths;
    }

    function parseLaunch(raw, isPast) {
      const providerName = raw.launch_service_provider?.name || '';
      let provider = 'other';
      if (/spacex/i.test(providerName)) provider = 'spacex';
      else if (/nasa|national aeronautics/i.test(providerName)) provider = 'nasa';
      else if (/united launch alliance|ula/i.test(providerName)) provider = 'ula';
      else if (/roscosmos|russian/i.test(providerName)) provider = 'roscosmos';

      let statusText = 'TBD', statusClass = 'status-tbd';
      if (isPast) {
        const s = raw.status?.abbrev || '';
        if (s === 'Success') { statusText = 'Success'; statusClass = 'status-success'; }
        else if (s === 'Failure') { statusText = 'Failure'; statusClass = 'status-failure'; }
        else if (s === 'Partial Failure') { statusText = 'Partial'; statusClass = 'status-failure'; }
        else { statusText = s || 'Unknown'; statusClass = 'status-tbd'; }
      } else {
        const s = raw.status?.abbrev || '';
        if (s === 'Go') { statusText = 'Go for Launch'; statusClass = 'status-success'; }
        else if (s === 'TBD') { statusText = 'TBD'; statusClass = 'status-tbd'; }
        else if (s === 'TBC') { statusText = 'To Be Confirmed'; statusClass = 'status-upcoming'; }
        else { statusText = s || 'Upcoming'; statusClass = 'status-upcoming'; }
      }

      let lat = raw.pad?.latitude ? parseFloat(raw.pad.latitude) : null;
      let lng = raw.pad?.longitude ? parseFloat(raw.pad.longitude) : null;
      if (!lat || !lng || (lat === 0 && lng === 0)) {
        const padName = raw.pad?.name || raw.pad?.location?.name || '';
        for (const [key, val] of Object.entries(knownSites)) {
          if (padName.toLowerCase().includes(key.toLowerCase())) {
            lat = val.lat; lng = val.lng; break;
          }
        }
      }

      return {
        id: raw.id, name: raw.name || 'Unknown Mission',
        rocket: raw.rocket?.configuration?.name || 'Unknown Rocket',
        provider, providerName,
        date: raw.net ? new Date(raw.net) : null,
        status: statusText, statusClass, lat, lng,
        padName: raw.pad?.name || 'Unknown Pad',
        location: raw.pad?.location?.name || 'Unknown Location',
        mission: raw.mission?.description || null,
        missionType: raw.mission?.type || null,
        orbit: raw.mission?.orbit?.name || null,
        image: raw.image || null, isPast,
      };
    }

      }) : 'TBD';
      let items = [
        { label: 'Rocket', value: launch.rocket },
        { label: 'Launch Date', value: dateStr },
        { label: 'Launch Site', value: launch.padName },
        { label: 'Location', value: launch.location },
        { label: 'Status', value: launch.status },
      ];
      if (launch.orbit) items.push({ label: 'Target Orbit', value: launch.orbit });
      if (launch.missionType) items.push({ label: 'Mission Type', value: launch.missionType });
      document.getElementById('detailGrid').innerHTML = items.map(i =>
        `<div class="detail-item"><div class="label">${i.label}</div><div class="value">${i.value}</div></div>`
      ).join('');
      const fact = funFacts[Math.floor(Math.random() * funFacts.length)];
      document.getElementById('funFact').innerHTML = `🧠 <strong>Did you know?</strong> ${fact}`;
      document.getElementById('detailPanel').classList.add('show');
    }

    function animateLaunchOnGlobe(launch) {
      if (!launch.lat || !launch.lng) return;
      const targetIdx = Math.abs(hashCode(String(launch.id))) % orbitTargets.length;
      const target = orbitTargets[targetIdx];
      arcsData = [{
        startLat: launch.lat, startLng: launch.lng,
        endLat: target.lat + (Math.random()*10-5),
        endLng: target.lng + (Math.random()*20-10),
        color: launch.provider==='spacex' ? ['#005288','#a7d8f0']
             : launch.provider==='nasa' ? ['#fc3d21','#ffa500']
             : launch.provider==='ula' ? ['#003366','#6699cc']
             : ['#7b61ff','#c4b5ff'],
        label: launch.name,
      }];
      globe.arcsData(arcsData);
      globe.pointOfView({ lat: launch.lat, lng: launch.lng, altitude: 2.0 }, 1200);
    }

    function hashCode(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) { hash = ((hash<<5)-hash)+str.charCodeAt(i); hash |= 0; }
      return hash;
    }

    // ── Build globe ──
    function initGlobe() {
      globe = Globe()(document.getElementById('globe-container'))
        .globeImageUrl('https://unpkg.com/three-globe@2.35.0/example/img/earth-blue-marble.jpg')
        .bumpImageUrl('https://unpkg.com/three-globe@2.35.0/example/img/earth-topology.png')
        .backgroundImageUrl('https://unpkg.com/three-globe@2.35.0/example/img/night-sky.png')
        .atmosphereColor('#3a5ba0')
        .atmosphereAltitude(0.2)
        .width(window.innerWidth)
        .height(window.innerHeight)

        // Launch site rings
        .ringsData([])
        .ringLat('lat')
        .ringLng('lng')
        .ringAltitude(0.005)
        .ringColor('color')
        .ringMaxRadius('maxR')
        .ringPropagationSpeed('speed')
        .ringRepeatPeriod('repeat')

        // Trajectory arcs
        .arcsData([])
        .arcStartLat('startLat').arcStartLng('startLng')
        .arcEndLat('endLat').arcEndLng('endLng')
        .arcColor('color')
        .arcDashLength(0.6).arcDashGap(0.3).arcDashAnimateTime(2000)
        .arcStroke(0.5).arcAltitudeAutoScale(0.4).arcLabel('label')

        // Labels for launch sites
        .labelsData([])
        .labelLat('lat').labelLng('lng').labelText('text')
        .labelSize(1.2).labelColor(() => '#c4b5ff')
        .labelDotRadius(0.3).labelAltitude(0.015)

        // Orbital paths
        .pathsData([])
        .pathPoints('coords')
        .pathPointLat('lat')
        .pathPointLng('lng')
        .pathPointAlt('alt')
        .pathColor(d => {
          const c = d.color;
          // Gradient: faded at start (past), bright at middle (now), faded at end (future)
          return d.constellation === 'iss'
            ? [`${c}33`, `${c}aa`, c, `${c}aa`, `${c}33`]
            : [`${c}15`, `${c}66`, `${c}88`, `${c}66`, `${c}15`];
        })
        .pathStroke(d => d.constellation === 'iss' ? 1.2 : 0.4)
        .pathDashLength(0.01)
        .pathDashGap(0)
        .pathDashAnimateTime(0)
        .pathTransitionDuration(0)

        // Satellites as floating sprites via custom layer
        .customLayerData([])
        .customThreeObject(d => {
          const geo = new THREE.SphereGeometry(d.radius, 8, 8);
          const mat = new THREE.MeshBasicMaterial({
            color: d.color,
            transparent: true,
            opacity: d.constellation === 'iss' ? 1.0 : 0.75,
          });
          return new THREE.Mesh(geo, mat);
        })
        .customThreeObjectUpdate((obj, d) => {
          Object.assign(obj.position, globe.getCoords(d.lat, d.lng, d.alt));
        });

      globe.controls().autoRotate = true;
      globe.controls().autoRotateSpeed = 0.4;
      globe.controls().enableZoom = true;

      window.addEventListener('resize', () => {
        globe.width(window.innerWidth).height(window.innerHeight);
      });
    }

    // Update globe with launch data (rings + arcs + labels)
    function updateGlobeData() {
      const all = [...allLaunches.upcoming, ...allLaunches.past];

      // Unique launch sites as pulsing rings
      const ringMap = new Map();
      for (const l of all) {
        if (!l.lat || !l.lng) continue;
        const key = `${l.lat.toFixed(2)},${l.lng.toFixed(2)}`;
        if (!ringMap.has(key)) {
          const color = l.provider==='spacex' ? '#a7d8f0'
                      : l.provider==='nasa' ? '#ff8a65'
                      : l.provider==='ula' ? '#6699cc'
                      : l.provider==='roscosmos' ? '#ef5350' : '#c4b5ff';
          ringMap.set(key, {
            lat: l.lat, lng: l.lng,
            color: () => color,
            maxR: 1.5, speed: 2, repeat: 1200,
            label: `${l.providerName}: ${l.name}`,
            id: l.id,
          });
        }
      }
      const rings = [...ringMap.values()];
      globe.ringsData(rings);

      // Labels
      const labels = rings.map(r => ({
        lat: r.lat, lng: r.lng,
        text: r.label.split(':')[0],
      }));
      globe.labelsData(labels);

      // Initial arcs
      const recentPast = allLaunches.past.filter(l => l.lat && l.lng).slice(0, 6);
      arcsData = recentPast.map((l, i) => {
        const t = orbitTargets[i % orbitTargets.length];
        return {
          startLat: l.lat, startLng: l.lng,
          endLat: t.lat+(Math.random()*6-3), endLng: t.lng+(Math.random()*12-6),
          color: l.provider==='spacex' ? ['rgba(0,82,136,0.6)','rgba(167,216,240,0.6)']
               : l.provider==='nasa' ? ['rgba(252,61,33,0.6)','rgba(255,165,0,0.6)']
               : ['rgba(123,97,255,0.6)','rgba(196,181,255,0.6)'],
          label: l.name,
        };
      });
      globe.arcsData(arcsData);
    }

    // ── Events ──
    function setupEvents() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentTab = tab.dataset.tab;
          renderLaunches();
        });
      });

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentFilter = btn.dataset.filter;
          renderLaunches();
        });
      });

      document.getElementById('searchInput').addEventListener('input', renderLaunches);

      document.getElementById('sidebarToggle').addEventListener('click', () => {
        const sb = document.getElementById('sidebar');
        sb.classList.toggle('collapsed');
        document.getElementById('sidebarToggle').textContent = sb.classList.contains('collapsed') ? '▶' : '◀';
      });

      document.getElementById('detailClose').addEventListener('click', () => {
        document.getElementById('detailPanel').classList.remove('show');
        activeLaunchId = null;
        renderLaunches();
        updateGlobeData();
        globe.pointOfView({ lat: 20, lng: 0, altitude: 2.5 }, 1200);
      });

      // Sat panel toggle
      document.getElementById('satPanelHeader').addEventListener('click', () => {
        document.getElementById('satPanel').classList.toggle('collapsed');
      });
    }

    function startCountdownTimer() {
      setInterval(() => {
        if (currentTab === 'upcoming') renderLaunches();
      }, 60000);
    }

    // ── Main ──
    async function main() {
      createStars();
      initGlobe();
      setupEvents();
      renderSatPanel();

      // Fetch launches and satellites in parallel
      const [_launches] = await Promise.allSettled([
        fetchLaunches(),
        loadSatellites(),
      ]);

      updateGlobeData();
      renderLaunches();

      setTimeout(() => {
        document.getElementById('loadingScreen').classList.add('hidden');
      }, 2800);

      startCountdownTimer();
      globe.pointOfView({ lat: 28, lng: -80, altitude: 2.5 }, 0);
    }

    main();
  </script>
</body>
</html>
